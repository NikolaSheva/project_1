name: Send to Telegram

on:
  schedule:
    - cron: '*/15 5-9 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Get and send products
        env:
          API_URL: ${{ secrets.NOTEBOOK_API_URL }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          # Получаем товары
          RESPONSE=$(curl -s -X POST $API_URL/api/watch/get-unsent/ \
            -H "Content-Type: application/json" \
            -d '{"limit":1,"min_photos":2}')
          
          echo "Response received"
          
          COUNT=$(echo $RESPONSE | jq -r '.count // 0')
          echo "Count: $COUNT"
          
          if [ "$COUNT" -gt 0 ]; then
            echo "Found products"
            # Простой тест отправки
            MESSAGE="Test from GitHub Actions"
            curl -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d "chat_id=$CHANNEL_ID" \
              -d "text=$MESSAGE"
          else
            echo "No products to send"
          fi