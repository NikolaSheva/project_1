name: Send to Telegram

on:
  schedule:
    - cron: '*/15 5-9 * * *'  # 10:00-14:00 Екб
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Get and send products
        env:
          API_URL: ${{ secrets.NOTEBOOK_API_URL }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          # Получаем товары
          RESPONSE=$(curl -s -X POST $API_URL/api/watch/get-unsent/ \
            -H "Content-Type: application/json" \
            -d '{"limit":1,"min_photos":2}')
          
          COUNT=$(echo $RESPONSE | jq -r '.count')
          
          if [ "$COUNT" -gt 0 ]; then
            # Отправляем в Telegram
            echo $RESPONSE | jq -c '.products[]' | while read product; do
              MESSAGE=$(echo $product | jq -r '.message')
              PHOTOS=$(echo $product | jq -r '.photos[]')
              
              # Формируем медиа-группу
              MEDIA='[]'
              FIRST=1
              for PHOTO in $PHOTOS; do
                if [ $FIRST -eq 1 ]; then
                  MEDIA=$(echo $MEDIA | jq --arg msg "$MESSAGE" --arg url "$PHOTO" \
                    '. + [{"type":"photo","media":$url,"caption":$msg,"parse_mode":"HTML"}]')
                  FIRST=0
                else
                  MEDIA=$(echo $MEDIA | jq --arg url "$PHOTO" '. + [{"type":"photo","media":$url}]')
                fi
              done
              
              # Отправляем
              curl -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMediaGroup" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\":\"$CHANNEL_ID\",\"media\":$MEDIA}"
              
              # Отмечаем отправленным
              PRODUCT_ID=$(echo $product | jq -r '.id')
              curl -X POST $API_URL/api/watch/mark-sent/ \
                -H "Content-Type: application/json" \
                -d "{\"product_ids\":[$PRODUCT_ID]}"
            done
          fi
