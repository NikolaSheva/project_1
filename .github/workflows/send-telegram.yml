name: Send to Telegram

on:
  schedule:
    - cron: '*/30 5-9 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send products to Telegram
        env:
          API_URL: ${{ secrets.NOTEBOOK_API_URL }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          echo "=== Starting workflow ==="
          
          # Проверяем secrets
          if [ -z "$API_URL" ]; then
            echo "ERROR: NOTEBOOK_API_URL secret is not set"
            exit 1
          fi
          
          echo "=== Making API request to ${API_URL} ==="
          
          # Получаем товары с полным выводом (-v)
          RESPONSE=$(curl -v -X POST "${API_URL}/api/watch/get-unsent/" \
            -H "Content-Type: application/json" \
            -d '{"limit":1,"min_photos":2}' \
            --max-time 30 \
            --fail \
            --show-error \
            2>&1)
          
          CURL_EXIT=$?
          
          echo "=== curl exit code: $CURL_EXIT ==="
          echo "=== Full response/error ==="
          echo "$RESPONSE"
          echo "=== End of response ==="
          
          if [ $CURL_EXIT -ne 0 ]; then
            echo "ERROR: curl failed with exit code $CURL_EXIT"
            exit $CURL_EXIT
          fi
          
          # Проверяем ответ
          if echo "$RESPONSE" | grep -q '"count": 0'; then
            echo "No products to send"
            exit 0
          fi
          
          echo "Found products, sending to Telegram..."
          
          # Отправляем в Telegram
          curl -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHANNEL_ID}" \
            -d "text=✅ Товары найдены! Отправляю..." \
            --max-time 10
          
          echo "=== Done ==="