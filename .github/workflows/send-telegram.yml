name: Test API Connection

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test API
        env:
          API_URL: ${{ secrets.NOTEBOOK_API_URL }}
        run: |
          echo "Testing API: ${API_URL}"
          
          # Тест 1: Проверка DNS/сети
          echo "=== Test 1: Ping ==="
          ping -c 2 project1.188.226.37.12.nip.io || true
          
          # Тест 2: Проверка порта
          echo "=== Test 2: Port check ==="
          timeout 5 nc -zv project1.188.226.37.12.nip.io 80 || true
          
          # Тест 3: Простой GET
          echo "=== Test 3: GET request ==="
          curl -v --max-time 10 "http://project1.188.226.37.12.nip.io/products/" || true
          
          # Тест 4: POST с данными
          echo "=== Test 4: POST request ==="
          curl -v -X POST "http://project1.188.226.37.12.nip.io/api/watch/get-unsent/" \
            -H "Content-Type: application/json" \
            -d '{"limit":1,"min_photos":2}' \
            --max-time 10 || true