name: Send to Telegram

on:
  schedule:
    - cron: '*/30 8-9 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      - name: Send products to Telegram
        env:
          API_URL: ${{ secrets.NOTEBOOK_API_URL }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          # Получаем товары
          RESPONSE=$(curl -s -X POST $API_URL/api/watch/get-unsent/ \
            -H "Content-Type: application/json" \
            -d '{"limit": 5, "min_photos": 2}')
          
          COUNT=$(echo "$RESPONSE" | jq '.count')
          
          if [ "$COUNT" -eq 0 ]; then
            echo "✅ No products to send"
            exit 0
          fi
          
          echo "📦 Found $COUNT products"
          
          # Отправляем каждый товар
          echo "$RESPONSE" | jq -c '.products[]' | while read product; do
            MESSAGE=$(echo "$product" | jq -r '.message')
            
            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d "chat_id=$CHANNEL_ID" \
              -d "text=$MESSAGE" \
              -d "parse_mode=HTML" \
              -d "disable_web_page_preview=true"
            
            # Отмечаем как отправленный
            PRODUCT_ID=$(echo "$product" | jq '.id')
            curl -s -X POST "$API_URL/api/watch/mark-sent/" \
              -H "Content-Type: application/json" \
              -d "{\"product_id\": $PRODUCT_ID}"
            
            sleep 1
          done
          
          echo "✅ Done"