name: Send to Telegram

on:
  schedule:
    - cron: '*/15 10-12 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger send
        env:
          API_URL: ${{ secrets.NOTEBOOK_API_URL }}
        run: |
          curl -X POST $API_URL/api/watch/send-unsent/